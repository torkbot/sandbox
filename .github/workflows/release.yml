name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_version:
        description: Version to publish, normally passed by the release driver from the npm release tag
        type: string
        required: true
      publish:
        description: Publish to npm via GitHub OIDC trusted publishing
        type: boolean
        required: true
        default: false

permissions:
  actions: read
  contents: read

env:
  SANDBOX_RELEASE_VERSION: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.release_version }}

jobs:
  verify:
    name: Verify release gates
    runs-on: ubuntu-24.04
    outputs:
      target-sha: ${{ steps.release-target.outputs.target-sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24

      - name: Validate release version
        run: |
          node <<'EOF'
          const input = process.env.SANDBOX_RELEASE_VERSION || '';
          const version = input.startsWith('v') ? input.slice(1) : input;

          if (!/^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-[0-9A-Za-z.-]+)?(?:\+[0-9A-Za-z.-]+)?$/.test(version)) {
            throw new Error(`Invalid release version: ${input}`);
          }
          EOF

      - name: Resolve release target
        id: release-target
        run: |
          set -euo pipefail
          target_sha="$(git rev-parse HEAD)"
          git fetch origin main
          git merge-base --is-ancestor "$target_sha" origin/main
          echo "target-sha=${target_sha}" >> "$GITHUB_OUTPUT"

  build-platform:
    name: Build platform package (${{ matrix.os }})
    needs:
      - verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            platform: darwin-arm64
          - os: ubuntu-24.04
            platform: linux-x64-gnu

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.verify.outputs.target-sha }}
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download release platform artifact from main
        run: node ./scripts/download-release-artifacts.ts --target-sha "${{ needs.verify.outputs.target-sha }}"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Stage release platform artifact
        run: |
          set -euo pipefail
          artifact_root="dist/release-artifacts/release-platform-${{ matrix.platform }}"
          node ./scripts/release-artifact-manifest.ts verify \
            --head-sha "${{ needs.verify.outputs.target-sha }}" \
            --platform "${{ matrix.platform }}" \
            --manifest "${artifact_root}/build-manifest.json" \
            --base-dir "${artifact_root}"
          mkdir -p target/release dist/rootfs
          cp "${artifact_root}/sandbox-host" target/release/sandbox-host
          chmod 755 target/release/sandbox-host
          cp "${artifact_root}/rootfs/alpine-3.23.qcow2" dist/rootfs/alpine-3.23.qcow2
          cp "${artifact_root}/rootfs/alpine-3.23.environment-facts.json" dist/rootfs/alpine-3.23.environment-facts.json

      - name: Prepare platform package
        run: node ./scripts/prepare-npm-packages.ts --version "$SANDBOX_RELEASE_VERSION" --platform --current

      - name: Pack platform package
        run: npm pack ./dist/npm/sandbox-* --pack-destination dist/npm

      - name: Upload platform package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: npm-platform-${{ runner.os }}-${{ runner.arch }}
          path: dist/npm/*.tgz
          if-no-files-found: error

  build-root:
    name: Build root package
    needs: verify
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.verify.outputs.target-sha }}

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript package
        run: npm run build:ts

      - name: Prepare root package
        run: node ./scripts/prepare-npm-packages.ts --version "$SANDBOX_RELEASE_VERSION" --root

      - name: Pack root package
        run: npm pack ./dist/npm/sandbox --pack-destination dist/npm

      - name: Upload root package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: npm-root
          path: dist/npm/*.tgz
          if-no-files-found: error

  publish:
    name: Publish to npm
    runs-on: ubuntu-24.04
    needs:
      - verify
      - build-platform
      - build-root
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.publish)
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.verify.outputs.target-sha }}

      - name: Download package tarballs
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          pattern: npm-*
          merge-multiple: true
          path: dist/npm

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Publish platform packages
        run: |
          set -euo pipefail
          version="${SANDBOX_RELEASE_VERSION#v}"
          for tarball in dist/npm/torkbot-sandbox-*-"${version}".tgz; do
            case "$tarball" in
              *torkbot-sandbox-"${version}".tgz) continue ;;
            esac
            npm publish "$tarball" --provenance --access public
          done

      - name: Publish root package
        run: |
          version="${SANDBOX_RELEASE_VERSION#v}"
          npm publish "dist/npm/torkbot-sandbox-${version}.tgz" --provenance --access public
