name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_version:
        description: Version to publish, normally passed by the release driver from the npm release tag
        type: string
        required: true
      publish:
        description: Publish to npm via GitHub OIDC trusted publishing
        type: boolean
        required: true
        default: false

permissions:
  contents: read

env:
  SANDBOX_RELEASE_VERSION: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.release_version }}

jobs:
  verify:
    name: Verify release gates
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust build cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ runner.os }}-${{ runner.arch }}

      - name: Install Linux host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm pkg-config build-essential

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test unit
        run: npm run test:unit

      - name: Check Rust workspace
        run: cargo check --workspace

      - name: Validate release version
        run: |
          node <<'EOF'
          const input = process.env.SANDBOX_RELEASE_VERSION || '';
          const version = input.startsWith('v') ? input.slice(1) : input;

          if (!/^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-[0-9A-Za-z.-]+)?(?:\+[0-9A-Za-z.-]+)?$/.test(version)) {
            throw new Error(`Invalid release version: ${input}`);
          }
          EOF

  build-kernel:
    name: Build kernel artifact (${{ matrix.kernel_arch }})
    needs: verify
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - kernel_arch: arm64
            runner: ubuntu-24.04-arm
          - kernel_arch: x86_64
            runner: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Compute fixture cache keys
        id: fixture-cache-keys
        run: node ./scripts/fixture-cache-keys.ts --runner-arch "${{ runner.arch }}"

      - name: Restore kernel fixture cache
        id: kernel-cache
        uses: actions/cache@v4
        with:
          path: dist/kernel
          key: ${{ steps.fixture-cache-keys.outputs.kernel-key }}
          enableCrossOsArchive: true

      - name: Install dependencies
        if: steps.kernel-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Build kernel artifact
        if: steps.kernel-cache.outputs.cache-hit != 'true'
        run: npm run build:kernel
        env:
          SANDBOX_KERNEL_ARCH: ${{ matrix.kernel_arch }}

      - name: Upload kernel artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-${{ matrix.kernel_arch }}
          path: dist/kernel
          if-no-files-found: error

  build-platform:
    name: Build platform package (${{ matrix.os }})
    needs:
      - verify
      - build-kernel
      - build-rootfs
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            kernel_arch: arm64
          - os: ubuntu-24.04
            kernel_arch: x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}
          submodules: recursive

      - name: Download kernel artifact
        uses: actions/download-artifact@v4
        with:
          name: kernel-${{ matrix.kernel_arch }}
          path: dist/kernel

      - name: Download rootfs artifact
        uses: actions/download-artifact@v4
        with:
          name: rootfs-${{ matrix.kernel_arch }}
          path: dist/rootfs

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust build cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-platform-${{ runner.os }}-${{ runner.arch }}

      - name: Install Linux host dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm pkg-config build-essential

      - name: Install dependencies
        run: npm ci

      - name: Build platform artifacts
        run: npm run build:host

      - name: Prepare platform package
        run: node ./scripts/prepare-npm-packages.ts --version "$SANDBOX_RELEASE_VERSION" --platform --current

      - name: Pack platform package
        run: npm pack ./dist/npm/sandbox-* --pack-destination dist/npm

      - name: Upload platform package
        uses: actions/upload-artifact@v4
        with:
          name: npm-platform-${{ runner.os }}-${{ runner.arch }}
          path: dist/npm/*.tgz
          if-no-files-found: error

  build-rootfs:
    name: Build rootfs artifact (${{ matrix.guest_arch }})
    needs: verify
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - guest_arch: arm64
            runner: ubuntu-24.04-arm
          - guest_arch: x86_64
            runner: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Compute fixture cache keys
        id: fixture-cache-keys
        run: node ./scripts/fixture-cache-keys.ts --runner-arch "${{ runner.arch }}"

      - name: Restore init fixture cache
        id: init-cache
        uses: actions/cache@v4
        with:
          path: dist/init
          key: ${{ steps.fixture-cache-keys.outputs.init-key }}
          enableCrossOsArchive: true

      - name: Restore rootfs fixture cache
        id: rootfs-cache
        uses: actions/cache@v4
        with:
          path: dist/rootfs
          key: ${{ steps.fixture-cache-keys.outputs.rootfs-key }}
          enableCrossOsArchive: true

      - name: Install dependencies
        if: steps.init-cache.outputs.cache-hit != 'true' || steps.rootfs-cache.outputs.cache-hit != 'true'
        run: npm ci

      - name: Build init binary for built-in rootfs
        if: steps.init-cache.outputs.cache-hit != 'true'
        run: npm run build:init

      - name: Build built-in rootfs
        if: steps.rootfs-cache.outputs.cache-hit != 'true'
        run: npm run build:rootfs

      - name: Build built-in rootfs QCOW2 image
        if: steps.rootfs-cache.outputs.cache-hit != 'true'
        run: npm run build:rootfs:qcow2

      - name: Upload rootfs artifact
        uses: actions/upload-artifact@v4
        with:
          name: rootfs-${{ matrix.guest_arch }}
          path: |
            dist/rootfs/alpine-3.23.qcow2
          if-no-files-found: error

  build-root:
    name: Build root package
    needs: verify
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript package
        run: npm run build:ts

      - name: Prepare root package
        run: node ./scripts/prepare-npm-packages.ts --version "$SANDBOX_RELEASE_VERSION" --root

      - name: Pack root package
        run: npm pack ./dist/npm/sandbox --pack-destination dist/npm

      - name: Upload root package
        uses: actions/upload-artifact@v4
        with:
          name: npm-root
          path: dist/npm/*.tgz
          if-no-files-found: error

  publish:
    name: Publish to npm
    runs-on: ubuntu-24.04
    needs:
      - build-platform
      - build-root
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.publish)
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - name: Download package tarballs
        uses: actions/download-artifact@v4
        with:
          pattern: npm-*
          merge-multiple: true
          path: dist/npm

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Publish platform packages
        run: |
          set -euo pipefail
          version="${SANDBOX_RELEASE_VERSION#v}"
          for tarball in dist/npm/torkbot-sandbox-*-"${version}".tgz; do
            case "$tarball" in
              *torkbot-sandbox-"${version}".tgz) continue ;;
            esac
            npm publish "$tarball" --provenance --access public
          done

      - name: Publish root package
        run: |
          version="${SANDBOX_RELEASE_VERSION#v}"
          npm publish "dist/npm/torkbot-sandbox-${version}.tgz" --provenance --access public
