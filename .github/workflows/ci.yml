name: CI

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Typecheck and unit tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-15
          - ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24
          cache: npm

      - name: Check workflow action pinning
        run: node ./scripts/check-github-actions-pinned.ts

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Restore Rust build cache
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          shared-key: test-${{ runner.os }}-${{ runner.arch }}

      - name: Install Linux host dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm pkg-config build-essential

      - name: Install dependencies
        run: npm ci

      - name: Typecheck TypeScript
        run: npm run typecheck

      - name: Check Rust workspace
        run: cargo check --workspace

      - name: Test Rust workspace
        run: npm run test:rust

      - name: Run unit tests
        run: npm run test:unit

  e2e-fixtures:
    name: Build e2e fixtures (ubuntu-24.04)
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24

      - name: Compute fixture cache keys
        id: fixture-cache-keys
        run: node ./scripts/fixture-cache-keys.ts --runner-arch "${{ runner.arch }}"

      - name: Restore kernel fixture cache
        id: kernel-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: dist/kernel
          key: ${{ steps.fixture-cache-keys.outputs.kernel-key }}
          enableCrossOsArchive: true

      - name: Restore init fixture cache
        id: init-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: dist/init
          key: ${{ steps.fixture-cache-keys.outputs.init-key }}
          enableCrossOsArchive: true

      - name: Restore rootfs fixture cache
        id: rootfs-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: dist/rootfs
          key: ${{ steps.fixture-cache-keys.outputs.rootfs-key }}
          enableCrossOsArchive: true

      - name: Build kernel fixture
        if: steps.kernel-cache.outputs.cache-hit != 'true'
        run: npm run build:kernel

      - name: Build sandbox init fixture
        if: steps.init-cache.outputs.cache-hit != 'true'
        run: npm run build:init

      - name: Build rootfs fixture
        if: steps.rootfs-cache.outputs.cache-hit != 'true'
        run: |
          npm run build:rootfs
          npm run build:rootfs:qcow2

  e2e-fixtures-arm64:
    name: Build e2e fixtures (ubuntu-24.04-arm)
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24

      - name: Compute fixture cache keys
        id: fixture-cache-keys
        run: node ./scripts/fixture-cache-keys.ts --runner-arch "${{ runner.arch }}"

      - name: Restore kernel fixture cache
        id: kernel-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: dist/kernel
          key: ${{ steps.fixture-cache-keys.outputs.kernel-key }}
          enableCrossOsArchive: true

      - name: Restore init fixture cache
        id: init-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: dist/init
          key: ${{ steps.fixture-cache-keys.outputs.init-key }}
          enableCrossOsArchive: true

      - name: Restore rootfs fixture cache
        id: rootfs-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: dist/rootfs
          key: ${{ steps.fixture-cache-keys.outputs.rootfs-key }}
          enableCrossOsArchive: true

      - name: Build kernel fixture
        if: steps.kernel-cache.outputs.cache-hit != 'true'
        run: npm run build:kernel

      - name: Build sandbox init fixture
        if: steps.init-cache.outputs.cache-hit != 'true'
        run: npm run build:init

      - name: Build rootfs fixture
        if: steps.rootfs-cache.outputs.cache-hit != 'true'
        run: |
          npm run build:rootfs
          npm run build:rootfs:qcow2

  e2e:
    name: Run e2e (ubuntu-24.04)
    runs-on: ubuntu-24.04
    needs:
      - e2e-fixtures

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Restore Rust build cache
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          shared-key: e2e-${{ runner.os }}-${{ runner.arch }}

      - name: Install Linux host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm pkg-config build-essential

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          sudo usermod -a -G kvm "$USER"
          ls -l /dev/kvm

      - name: Install dependencies
        run: npm ci

      - name: Compute fixture cache keys
        id: fixture-cache-keys
        run: node ./scripts/fixture-cache-keys.ts --runner-arch "${{ runner.arch }}"

      - name: Restore kernel fixture cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: dist/kernel
          key: ${{ steps.fixture-cache-keys.outputs.kernel-key }}
          enableCrossOsArchive: true
          fail-on-cache-miss: true

      - name: Restore init fixture cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: dist/init
          key: ${{ steps.fixture-cache-keys.outputs.init-key }}
          enableCrossOsArchive: true
          fail-on-cache-miss: true

      - name: Restore rootfs fixture cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: dist/rootfs
          key: ${{ steps.fixture-cache-keys.outputs.rootfs-key }}
          enableCrossOsArchive: true
          fail-on-cache-miss: true

      - name: Compute package artifact cache key
        id: package-cache-key
        shell: bash
        run: |
          set -euo pipefail
          {
            printf 'runner-os=%s\n' '${{ runner.os }}'
            printf 'runner-arch=%s\n' '${{ runner.arch }}'
            printf 'kernel-fixture-key=%s\n' '${{ steps.fixture-cache-keys.outputs.kernel-key }}'
            printf 'init-fixture-key=%s\n' '${{ steps.fixture-cache-keys.outputs.init-key }}'
            printf 'rootfs-fixture-key=%s\n' '${{ steps.fixture-cache-keys.outputs.rootfs-key }}'
            git submodule status --recursive deps/libkrun deps/libkrunfw
            git ls-files -z \
              package.json \
              package-lock.json \
              Cargo.lock \
              Cargo.toml \
              crates \
              scripts \
              src \
              tsconfig*.json \
              | xargs -0 shasum -a 256
          } > package-cache-inputs.txt
          key_hash="$(shasum -a 256 package-cache-inputs.txt | cut -d ' ' -f1)"
          echo "key=sandbox-package-${{ runner.os }}-${{ runner.arch }}-${key_hash}" >> "$GITHUB_OUTPUT"

      - name: Restore package artifact cache
        id: package-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            dist
            target/release/sandbox-host
          key: ${{ steps.package-cache-key.outputs.key }}

      - name: Build package artifacts
        if: steps.package-cache.outputs.cache-hit != 'true'
        run: npm run build

      - name: Run artifact tests
        run: npm run test:artifact

      - name: Run e2e tests
        run: npm run test:e2e

      - name: Upload e2e diagnostics
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: e2e-diagnostics-${{ runner.os }}-${{ runner.arch }}
          path: test-results/e2e
          if-no-files-found: ignore

  release-platform-artifacts:
    name: Build release platform artifact (${{ matrix.platform }})
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - e2e-fixtures
      - e2e-fixtures-arm64
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: darwin-arm64
            os: macos-15
          - platform: linux-x64-gnu
            os: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Restore Rust build cache
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          shared-key: release-platform-main-${{ runner.os }}-${{ runner.arch }}

      - name: Install Linux host dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm pkg-config build-essential

      - name: Install dependencies
        run: npm ci

      - name: Compute fixture cache keys
        id: fixture-cache-keys
        run: node ./scripts/fixture-cache-keys.ts --runner-arch "${{ runner.arch }}"

      - name: Restore kernel fixture cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: dist/kernel
          key: ${{ steps.fixture-cache-keys.outputs.kernel-key }}
          enableCrossOsArchive: true
          fail-on-cache-miss: true

      - name: Restore init fixture cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: dist/init
          key: ${{ steps.fixture-cache-keys.outputs.init-key }}
          enableCrossOsArchive: true
          fail-on-cache-miss: true

      - name: Restore rootfs fixture cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: dist/rootfs
          key: ${{ steps.fixture-cache-keys.outputs.rootfs-key }}
          enableCrossOsArchive: true
          fail-on-cache-miss: true

      - name: Build host artifact
        run: npm run build:host
        env:
          SANDBOX_SKIP_HOST_SIGNING: ${{ matrix.platform == 'darwin-arm64' && '1' || '' }}

      - name: Stage release platform artifact
        if: matrix.platform != 'darwin-arm64'
        run: |
          set -euo pipefail
          artifact_root="dist/release-platform/${{ matrix.platform }}"
          mkdir -p "${artifact_root}/rootfs"
          cp target/release/sandbox-host "${artifact_root}/sandbox-host"
          cp dist/rootfs/alpine-3.23.qcow2 "${artifact_root}/rootfs/alpine-3.23.qcow2"
          cp dist/rootfs/alpine-3.23.environment-facts.json "${artifact_root}/rootfs/alpine-3.23.environment-facts.json"
          node ./scripts/release-artifact-manifest.ts write \
            --head-sha "${{ github.sha }}" \
            --platform "${{ matrix.platform }}" \
            --output "${artifact_root}/build-manifest.json" \
            --base-dir "${artifact_root}" \
            --kernel-key "${{ steps.fixture-cache-keys.outputs.kernel-key }}" \
            --init-key "${{ steps.fixture-cache-keys.outputs.init-key }}" \
            --rootfs-key "${{ steps.fixture-cache-keys.outputs.rootfs-key }}" \
            --file sandbox-host \
            --file rootfs/alpine-3.23.qcow2 \
            --file rootfs/alpine-3.23.environment-facts.json

      - name: Upload release platform artifact
        if: matrix.platform != 'darwin-arm64'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-platform-${{ matrix.platform }}
          path: dist/release-platform/${{ matrix.platform }}
          if-no-files-found: error

      - name: Stage unsigned macOS release inputs
        if: matrix.platform == 'darwin-arm64'
        run: |
          set -euo pipefail
          artifact_root="dist/unsigned-release-platform/${{ matrix.platform }}"
          mkdir -p "${artifact_root}/rootfs"
          cp target/release/sandbox-host "${artifact_root}/sandbox-host"
          cp dist/rootfs/alpine-3.23.qcow2 "${artifact_root}/rootfs/alpine-3.23.qcow2"
          cp dist/rootfs/alpine-3.23.environment-facts.json "${artifact_root}/rootfs/alpine-3.23.environment-facts.json"
          {
            printf 'kernel_key=%s\n' '${{ steps.fixture-cache-keys.outputs.kernel-key }}'
            printf 'init_key=%s\n' '${{ steps.fixture-cache-keys.outputs.init-key }}'
            printf 'rootfs_key=%s\n' '${{ steps.fixture-cache-keys.outputs.rootfs-key }}'
          } > "${artifact_root}/fixture-keys.env"

      - name: Upload unsigned macOS release inputs
        if: matrix.platform == 'darwin-arm64'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: unsigned-release-platform-darwin-arm64
          path: dist/unsigned-release-platform/darwin-arm64
          if-no-files-found: error

  sign-notarize-macos-release-artifact:
    name: Sign and notarize release platform artifact (darwin-arm64)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - release-platform-artifacts
    runs-on: macos-15
    environment: macos-release-signing

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24

      - name: Download unsigned macOS release inputs
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: unsigned-release-platform-darwin-arm64
          path: dist/signing/darwin-arm64

      - name: Import macOS signing certificate
        uses: Apple-Actions/import-codesign-certs@fe74d46e82474f87e1ba79832ad28a4013d0e33a # v6.1.0
        with:
          keychain: sandbox-macos-signing
          create-keychain: true
          keychain-password: ${{ secrets.SANDBOX_MACOS_SIGNING_KEYCHAIN_PASSWORD }}
          p12-file-base64: ${{ secrets.SANDBOX_MACOS_SIGNING_CERTIFICATE_P12 }}
          p12-password: ${{ secrets.SANDBOX_MACOS_SIGNING_CERTIFICATE_PASSWORD }}

      - name: Sign and verify sandbox-host
        env:
          SANDBOX_MACOS_SIGNING_IDENTITY: ${{ vars.SANDBOX_MACOS_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          : "${SANDBOX_MACOS_SIGNING_IDENTITY:?missing SANDBOX_MACOS_SIGNING_IDENTITY variable}"
          artifact_path="dist/signing/darwin-arm64/sandbox-host"
          codesign \
            --force \
            --sign "$SANDBOX_MACOS_SIGNING_IDENTITY" \
            --options runtime \
            --entitlements entitlements/macos-hvf.plist \
            --timestamp \
            "$artifact_path"
          codesign --verify --strict --verbose=2 "$artifact_path"
          codesign --display --verbose=4 "$artifact_path" 2>&1 | tee dist/signing/darwin-arm64/codesign-display.txt

      - name: Notarize sandbox-host
        timeout-minutes: 45
        env:
          APPLE_NOTARY_KEY_P8: ${{ secrets.APPLE_NOTARY_KEY_P8 }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
        run: |
          set -euo pipefail
          : "${APPLE_NOTARY_KEY_P8:?missing APPLE_NOTARY_KEY_P8 secret}"
          : "${APPLE_NOTARY_KEY_ID:?missing APPLE_NOTARY_KEY_ID secret}"
          : "${APPLE_NOTARY_ISSUER_ID:?missing APPLE_NOTARY_ISSUER_ID secret}"
          mkdir -p dist/notary
          notary_key_path="$RUNNER_TEMP/sandbox-notary-key.p8"
          printf '%s' "$APPLE_NOTARY_KEY_P8" > "$notary_key_path"
          ditto -c -k --keepParent dist/signing/darwin-arm64/sandbox-host dist/notary/sandbox-host.zip
          submit_json="$(
            xcrun notarytool submit dist/notary/sandbox-host.zip \
              --key "$notary_key_path" \
              --key-id "$APPLE_NOTARY_KEY_ID" \
              --issuer "$APPLE_NOTARY_ISSUER_ID" \
              --output-format json
          )"
          submission_id="$(printf '%s' "$submit_json" | node -e 'let input = ""; process.stdin.on("data", chunk => input += chunk); process.stdin.on("end", () => { const result = JSON.parse(input); if (!result.id) throw new Error("notarytool output did not include id"); console.log(result.id); });')"
          echo "::notice title=Apple Notary submission::$submission_id"
          status=""
          for attempt in $(seq 1 80); do
            info_json="$(
              xcrun notarytool info "$submission_id" \
                --key "$notary_key_path" \
                --key-id "$APPLE_NOTARY_KEY_ID" \
                --issuer "$APPLE_NOTARY_ISSUER_ID" \
                --output-format json
            )"
            printf '%s\n' "$info_json" > dist/signing/darwin-arm64/notarytool-submit.json
            status="$(printf '%s' "$info_json" | node -e 'let input = ""; process.stdin.on("data", chunk => input += chunk); process.stdin.on("end", () => { const result = JSON.parse(input); if (!result.status) throw new Error("notarytool info output did not include status"); console.log(result.status); });')"
            echo "::notice title=Apple Notary status::attempt ${attempt}: ${status}"
            case "$status" in
              Accepted|Invalid|Rejected) break ;;
            esac
            sleep 30
          done
          if [ "$status" != "Accepted" ]; then
            xcrun notarytool log "$submission_id" \
              --key "$notary_key_path" \
              --key-id "$APPLE_NOTARY_KEY_ID" \
              --issuer "$APPLE_NOTARY_ISSUER_ID" \
              dist/signing/darwin-arm64/notarytool-log.json || true
            if [ -f dist/signing/darwin-arm64/notarytool-log.json ]; then
              cat dist/signing/darwin-arm64/notarytool-log.json
            fi
            exit 1
          fi
          xcrun notarytool log "$submission_id" \
            --key "$notary_key_path" \
            --key-id "$APPLE_NOTARY_KEY_ID" \
            --issuer "$APPLE_NOTARY_ISSUER_ID" \
            dist/signing/darwin-arm64/notarytool-log.json
          if [ "$status" != "Accepted" ]; then
            cat dist/signing/darwin-arm64/notarytool-log.json
            exit 1
          fi

      - name: Stage signed and notarized release platform artifact
        run: |
          set -euo pipefail
          . dist/signing/darwin-arm64/fixture-keys.env
          codesign_authority="$(grep '^Authority=' dist/signing/darwin-arm64/codesign-display.txt | head -n 1 | cut -d '=' -f 2-)"
          codesign_team_identifier="$(grep '^TeamIdentifier=' dist/signing/darwin-arm64/codesign-display.txt | head -n 1 | cut -d '=' -f 2-)"
          notarization_submission_id="$(node -e 'const result = JSON.parse(require("node:fs").readFileSync("dist/signing/darwin-arm64/notarytool-submit.json", "utf8")); console.log(result.id);')"
          notarization_status="$(node -e 'const result = JSON.parse(require("node:fs").readFileSync("dist/signing/darwin-arm64/notarytool-submit.json", "utf8")); console.log(result.status);')"
          artifact_root="dist/release-platform/darwin-arm64"
          mkdir -p "${artifact_root}/rootfs"
          cp dist/signing/darwin-arm64/sandbox-host "${artifact_root}/sandbox-host"
          cp dist/signing/darwin-arm64/rootfs/alpine-3.23.qcow2 "${artifact_root}/rootfs/alpine-3.23.qcow2"
          cp dist/signing/darwin-arm64/rootfs/alpine-3.23.environment-facts.json "${artifact_root}/rootfs/alpine-3.23.environment-facts.json"
          node ./scripts/release-artifact-manifest.ts write \
            --head-sha "${{ github.sha }}" \
            --platform darwin-arm64 \
            --output "${artifact_root}/build-manifest.json" \
            --base-dir "${artifact_root}" \
            --kernel-key "$kernel_key" \
            --init-key "$init_key" \
            --rootfs-key "$rootfs_key" \
            --macos-codesign-authority "$codesign_authority" \
            --macos-codesign-team-identifier "$codesign_team_identifier" \
            --macos-notarization-submission-id "$notarization_submission_id" \
            --macos-notarization-status "$notarization_status" \
            --file sandbox-host \
            --file rootfs/alpine-3.23.qcow2 \
            --file rootfs/alpine-3.23.environment-facts.json

      - name: Upload release platform artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-platform-darwin-arm64
          path: dist/release-platform/darwin-arm64
          if-no-files-found: error
