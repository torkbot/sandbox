name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Typecheck and unit tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-15
          - ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux host dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm pkg-config build-essential

      - name: Install dependencies
        run: npm ci

      - name: Typecheck TypeScript
        run: npm run typecheck

      - name: Check Rust workspace
        run: cargo check --workspace

      - name: Test Rust workspace
        run: npm run test:rust

      - name: Build native module
        run: npm run build:native

      - name: Run unit tests
        run: npm run test:unit

  e2e:
    name: Build fixtures and run e2e (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-15
          - ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux host dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm pkg-config build-essential

      - name: Install dependencies
        run: npm ci

      - name: Compute fixture cache key
        id: fixture-cache-key
        shell: bash
        run: |
          set -euo pipefail
          {
            printf 'runner-arch=%s\n' '${{ runner.arch }}'
            git submodule status --recursive deps/libkrun deps/libkrunfw
            shasum -a 256 \
              package-lock.json \
              Cargo.lock \
              crates/sandbox-init/Cargo.toml \
              crates/sandbox-init/src/main.rs \
              scripts/build-kernel.ts \
              scripts/build-init.ts \
              scripts/build-libkrun-init.ts \
              scripts/build-rootfs.ts \
              scripts/build-rootfs-erofs.ts
          } > fixture-cache-inputs.txt
          key_hash="$(shasum -a 256 fixture-cache-inputs.txt | cut -d ' ' -f1)"
          echo "key=sandbox-fixtures-${{ runner.arch }}-${key_hash}" >> "$GITHUB_OUTPUT"

      - name: Restore fixture cache
        id: fixture-cache
        uses: actions/cache@v4
        with:
          path: |
            dist/kernel
            dist/init
            dist/rootfs
          key: ${{ steps.fixture-cache-key.outputs.key }}
          enableCrossOsArchive: true

      - name: Build kernel fixture
        if: steps.fixture-cache.outputs.cache-hit != 'true'
        run: npm run build:kernel

      - name: Build sandbox init fixture
        if: steps.fixture-cache.outputs.cache-hit != 'true'
        run: npm run build:init

      - name: Build libkrun stage-0 init fixture
        if: steps.fixture-cache.outputs.cache-hit != 'true'
        run: npm run build:libkrun-init

      - name: Build rootfs fixture
        if: steps.fixture-cache.outputs.cache-hit != 'true'
        run: |
          npm run build:rootfs
          npm run build:rootfs:erofs

      - name: Build package artifacts
        run: npm run build

      - name: Run artifact tests
        run: npm run test:artifact

      - name: Run e2e tests
        run: npm run test:e2e
