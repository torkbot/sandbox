name: Image Release Publish

on:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish image packages to npm
    if: startsWith(github.event.release.tag_name, 'image/')
    runs-on: ubuntu-24.04

    steps:
      - name: Set up Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Download release package assets
        run: |
          mkdir -p dist/npm
          gh release download "$IMAGE_RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --pattern "*.tgz" --dir dist/npm
        env:
          GH_TOKEN: ${{ github.token }}
          IMAGE_RELEASE_TAG: ${{ github.event.release.tag_name }}

      - name: Publish architecture packages
        run: |
          set -euo pipefail
          for tarball in dist/npm/*-arm64-*.tgz dist/npm/*-x64-*.tgz; do
            [ -e "$tarball" ] || continue
            npm publish "$tarball" --provenance --access public
          done

      - name: Publish root image package
        run: |
          set -euo pipefail
          for tarball in dist/npm/*.tgz; do
            case "$tarball" in
              *-arm64-*.tgz|*-x64-*.tgz) continue ;;
            esac
            npm publish "$tarball" --provenance --access public
          done
